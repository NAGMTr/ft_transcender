services:
 
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plataforma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
 
  app-backend:
    build:
      context: ./app-backend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: plataforma
    ports:
      - "3000:3000"
    volumes:
      - ./app-backend:/app
      - /app/node_modules
    depends_on:
      - db
 
  app-frontend:
    build:
      context: ./app-frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./app-frontend:/app
      - /app/node_modules
    depends_on:
      - app-backend
 
volumes:
  postgres_data:
 